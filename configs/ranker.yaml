ranker:
  input:
    train_path: "data/processed/train_ranking.parquet"
    valid_path: "data/processed/valid_ranking.parquet"
    
  output:
    logreg_model_path: "artifacts/models/logreg_ranker.pkl"
    challenger_model_path: "artifacts/models/catboost_ranker.pkl"
    metrics_json_path: "artifacts/metrics/ranker_metrics.json"
    metrics_csv_path: "artifacts/metrics/ranker_metrics.csv"
    report_path: "artifacts/reports/ranker_report.md"
    
  columns:
    user_id_column: "user_id"
    item_id_column: "item_id"
    target_column: "target"
    
  training:
    random_seed: 42
    baseline_model: "logreg"
    challenger_model: "catboost"
    
  features:
    # Columns to exclude from features (ID and target columns)
    exclude_columns: ["user_id", "item_id", "target"]
    
  evaluation:
    k_values: [10, 50]
