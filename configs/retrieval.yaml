retrieval:
  user_id_column: "user_id"
  item_id_column: "item_id"
  
  popularity:
    top_k: 100
    output_path: "artifacts/candidates/popularity_candidates.parquet"
    
  itemknn:
    top_k: 50
    similarity: "cosine"
    min_similarity: 0.01
    output_path: "artifacts/candidates/itemknn_candidates.parquet"
    
  # Shared data sources
  input:
    interactions_path: "data/processed/train_interactions.parquet"
    item_features_path: "data/processed/item_features.parquet"
