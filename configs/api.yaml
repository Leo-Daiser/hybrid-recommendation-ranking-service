api:
  service_name: "hybrid-recsys"
  version: "1.0.0"

recommendation:
  default_k: 10
  max_k: 50
  user_id_column: "user_id"
  item_id_column: "item_id"
  score_column: "ranking_score"
  fallback_score_column: "retrieval_score"
  model_version: "ranker_logreg_v1"
  
artifacts:
  candidate_cache_path: "artifacts/candidates/itemknn_candidates.parquet"
  popularity_cache_path: "artifacts/candidates/popularity_candidates.parquet"
  user_features_path: "artifacts/features/user_features.parquet"
  item_features_path: "artifacts/features/item_features.parquet"
  ranker_model_path: "artifacts/models/logreg_ranker.pkl"
