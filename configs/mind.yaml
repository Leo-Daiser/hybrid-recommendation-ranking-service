mind:
  input:
    train_behaviors: "data/raw/mind/MINDsmall/train/behaviors.tsv"
    train_news: "data/raw/mind/MINDsmall/train/news.tsv"
    valid_behaviors: "data/raw/mind/MINDsmall/valid/behaviors.tsv"
    valid_news: "data/raw/mind/MINDsmall/valid/news.tsv"
    
  output:
    train_interactions: "data/processed/mind_train_interactions.parquet"
    valid_interactions: "data/processed/mind_valid_interactions.parquet"
    items: "data/processed/mind_items.parquet"
    report_path: "artifacts/reports/mind_migration.json"
    
  schema:
    behaviors:
      columns:
        - "impression_id"
        - "user_id"
        - "time"
        - "history"
        - "impressions"
    news:
      columns:
        - "item_id"
        - "category"
        - "subcategory"
        - "title"
        - "abstract"
        - "url"
        - "title_entities"
        - "abstract_entities"
        
  validation:
    strict_labels: true
