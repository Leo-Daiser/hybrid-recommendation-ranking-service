pipeline:
  name: "MovieLens Hybrid Recommender Pipeline"
  version: "1.0.0"
  
  metadata:
    run_id_prefix: "run_"
    runs_dir: "artifacts/pipeline_runs"
    
  steps:
    download:
      name: "Download MovieLens"
      module: "src.data.download"
      method: "download_movielens"
      required_outputs:
        - "data/raw/movielens/ml-latest-small/ratings.csv"
        - "data/raw/movielens/ml-latest-small/movies.csv"

    validate_raw:
      name: "Validate Raw Schema"
      module: "src.data.validate_schema"
      method: "validate_movielens_raw"
      depends_on: ["download"]

    prepare_interactions:
      name: "Temporal Split & Implicit Labels"
      module: "src.data.prepare_interactions"
      method: "prepare_interactions"
      depends_on: ["validate_raw"]
      required_outputs:
        - "data/processed/train_interactions.parquet"
        - "data/processed/valid_interactions.parquet"

    build_features:
      name: "User & Item Features"
      module: "src.features.build_features"
      method: "build_features"
      depends_on: ["prepare_interactions"]
      required_outputs:
        - "data/processed/user_features.parquet"
        - "data/processed/item_features.parquet"

    build_popularity_candidates:
      name: "Popularity Retrieval"
      module: "src.retrieval.build_candidates"
      method: "build_popularity_candidates"
      depends_on: ["prepare_interactions"]
      required_outputs:
        - "artifacts/candidates/popularity_candidates.parquet"

    build_itemknn_candidates:
      name: "Item-KNN Retrieval"
      module: "src.retrieval.build_itemknn_candidates"
      method: "build_itemknn_candidates"
      depends_on: ["prepare_interactions", "build_features"]
      required_outputs:
        - "artifacts/candidates/itemknn_candidates.parquet"

    evaluate_retrieval:
      name: "Retrieval Metrics"
      module: "src.evaluation.run_retrieval_evaluation"
      method: "run_retrieval_evaluation"
      depends_on: ["build_popularity_candidates", "build_itemknn_candidates"]
      required_outputs:
        - "artifacts/metrics/retrieval_valid.json"
        - "artifacts/reports/retrieval_valid.md"

    build_ranking_dataset:
      name: "Ranking Dataset Creation"
      module: "src.ranking.build_ranking_dataset"
      method: "build_ranking_dataset"
      depends_on: ["build_itemknn_candidates", "build_features"]
      required_outputs:
        - "data/processed/train_ranking.parquet"
        - "data/processed/valid_ranking.parquet"

    train_ranker:
      name: "Ranker Training"
      module: "src.ranking.run_train_ranker"
      method: "run_train_ranker"
      depends_on: ["build_ranking_dataset"]
      required_outputs:
        - "artifacts/models/logreg_ranker.pkl"
        - "artifacts/reports/ranker_report.md"
